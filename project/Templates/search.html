{% extends "base.html" %}

{% block content %}
<h2><i class="fa-solid fa-magnifying-glass"></i> Search Student</h2>

<form action="/search" method="POST">
    <label><i class="fa-solid fa-id-card"></i> Enter Name (Partial or Full):</label>
    <div style="display: flex; gap: 10px; align-items: center;">
        <input type="text" name="search_name" placeholder="E.g., John" required style="margin-top: 0;">
        <button type="submit" style="margin-top: 0; width: auto; padding: 14px 25px;"><i class="fa-solid fa-search"></i>
            Search</button>
    </div>
</form>

{% if search_term and students %}
<h3><i class="fa-solid fa-list-check"></i> Results for "{{ search_term }}"</h3>

<div class="table-responsive">
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Class</th>
            <th>Action</th>
        </tr>
        {% for s in students %}
        <tr>
            <td><strong>#{{ s.student_id }}</strong></td>
            <td style="font-weight: 500;">{{ s.name }}</td>
            <td><span style="background: #edf2f7; padding: 4px 8px; border-radius: 4px; font-size: 0.9em;">{{ s.class
                    }}</span></td>
            <td><a href="/view" style="color: #667eea; text-decoration: none; font-weight: 600;">View details</a></td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endif %}
{% endblock %}
